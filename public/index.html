<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBDown 音乐批量下载器</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>BBDown 音乐批量下载器</h1>
        <p class="sub">
          每行输入一首歌名，系统将自动检索并评分候选视频，选择最优结果下载音频。
        </p>

        <label for="songs">歌名列表（每行一首）</label>
        <textarea id="songs" placeholder="晴天&#10;七里香&#10;稻香"></textarea>

        <div class="grid">
          <label>
            下载目录
            <div class="path-row">
              <input id="outputDir" type="text" placeholder="默认：用户主目录" />
              <button id="pickDirBtn" type="button" class="secondary">选择</button>
            </div>
          </label>
          <label>
            并发数量（1-8）
            <input id="maxConcurrent" type="number" min="1" max="8" value="2" />
          </label>
          <label>
            搜索排序
            <select id="orderType">
              <option value="totalrank">综合排序（totalrank）</option>
              <option value="pubdate">最新发布（pubdate）</option>
              <option value="click">最多点击（click）</option>
              <option value="stow">最多收藏（stow）</option>
              <option value="dm">最多弹幕（dm）</option>
              <option value="scores">最多评论（scores）</option>
            </select>
          </label>
          <label>
            输出格式
            <select id="audioFormat">
              <option value="mp3">mp3（推荐）</option>
              <option value="m4a">m4a</option>
              <option value="aac">aac</option>
              <option value="flac">flac（无损）</option>
              <option value="wav">wav（无损）</option>
              <option value="ogg">ogg</option>
              <option value="opus">opus</option>
              <option value="original">original（保持 BBDown 原始音频）</option>
            </select>
          </label>
          <label>
            音频比特率（kbps）
            <input id="audioBitrateKbps" type="number" min="64" max="320" value="192" />
          </label>
          <label>
            时长筛选（分钟，-1表示不限）
            <input id="timeRange" type="number" min="-1" max="720" value="-1" />
          </label>
          <label>
            视频分区 tid（可选）
            <input id="videoZoneType" type="number" min="0" placeholder="如 3 表示音乐分区" />
          </label>
          <label>
            发布时间开始（可选）
            <input id="timeStart" type="date" />
          </label>
          <label>
            发布时间结束（可选）
            <input id="timeEnd" type="date" />
          </label>
          <label>
            每页候选数量（1-42）
            <input id="pageSize" type="number" min="1" max="42" value="20" />
          </label>
          <label>
            评分候选上限（1-20）
            <input id="maxCandidates" type="number" min="1" max="20" value="8" />
          </label>
        </div>

        <section class="cookie-panel">
          <div class="cookie-panel-head">
            <label for="cookie">B 站 Cookie（会员内容通常需要）</label>
            <div class="cookie-actions">
              <button id="biliLoginBtn" type="button" class="secondary">
                内置登录（扫码/账号密码）
              </button>
              <button id="cookieCheckBtn" type="button" class="secondary">检查 Cookie</button>
              <button id="clearCookieBtn" type="button" class="danger">清空 Cookie</button>
            </div>
          </div>
          <textarea
            id="cookie"
            class="cookie-input"
            placeholder="可手动粘贴：SESSDATA=...; bili_jct=...; DedeUserID=...;"
          ></textarea>
          <p id="cookieInfo" class="hint">可手动输入，或点“内置登录”自动获取。</p>
        </section>

        <button id="startBtn">开始批量下载</button>
        <p id="hint" class="hint"></p>
      </section>

      <section class="panel result-panel">
        <h2>任务状态</h2>
        <div id="summary" class="summary">暂无任务</div>
        <div id="items"></div>

        <h3>运行日志</h3>
        <pre id="logs" class="logs">-</pre>
      </section>
    </main>

    <script>
      const el = (id) => document.getElementById(id);
      const startBtn = el("startBtn");
      const hint = el("hint");
      const songs = el("songs");
      const outputDir = el("outputDir");
      const pickDirBtn = el("pickDirBtn");
      const maxConcurrent = el("maxConcurrent");
      const orderType = el("orderType");
      const cookie = el("cookie");
      const cookieInfo = el("cookieInfo");
      const biliLoginBtn = el("biliLoginBtn");
      const cookieCheckBtn = el("cookieCheckBtn");
      const clearCookieBtn = el("clearCookieBtn");
      const audioFormat = el("audioFormat");
      const audioBitrateKbps = el("audioBitrateKbps");
      const timeRange = el("timeRange");
      const videoZoneType = el("videoZoneType");
      const timeStart = el("timeStart");
      const timeEnd = el("timeEnd");
      const pageSize = el("pageSize");
      const maxCandidates = el("maxCandidates");
      const summary = el("summary");
      const items = el("items");
      const logs = el("logs");

      let currentJobId = null;
      let pollTimer = null;
      const BITRATE_DISABLED_FORMATS = new Set(["original", "flac", "wav"]);
      const COOKIE_STORAGE_KEY = "bbdown.music.cookie.v1";
      let cookieActionBusy = false;

      boot();
      syncBitrateState();
      loadCookieFromStorage();

      audioFormat.addEventListener("change", syncBitrateState);
      cookie.addEventListener("input", () => {
        persistCookie(cookie.value);
      });

      async function boot() {
        setCookieInfo("可手动输入，或点“内置登录”自动获取。");
        try {
          const resp = await fetch("/api/health");
          const data = await resp.json();
          if (resp.ok) {
            if (data.defaultOutputDir && !outputDir.value) {
              outputDir.value = data.defaultOutputDir;
            }
            const bbdownMsg = data.bundledBbdownReady
              ? `BBDown 已就绪`
              : `未找到 BBDown`;
            const ffmpegMsg = data.bundledFfmpegReady
              ? `FFmpeg 已就绪`
              : `未找到 FFmpeg`;
            setHint(
              `${bbdownMsg}（${data.bundledBbdownPath}） | ${ffmpegMsg}（${data.bundledFfmpegPath}）`,
              !data.bundledBbdownReady || !data.bundledFfmpegReady
            );
          }
        } catch (err) {
          setHint(`健康检查失败：${err.message}`, true);
        }
        await tryHydrateCookieFromElectron();
        try {
          await inspectCookie(false);
        } catch (err) {
          setCookieInfo(`Cookie 检查失败：${err.message}`, true);
        }
      }

      startBtn.addEventListener("click", async () => {
        clearPolling();
        setHint("");
        items.innerHTML = "";
        logs.textContent = "-";
        summary.textContent = "提交任务中...";

        const payload = {
          songs: songs.value,
          outputDir: outputDir.value,
          maxConcurrent: Number(maxConcurrent.value || 2),
          cookie: cookie.value,
          audioFormat: audioFormat.value,
          audioBitrateKbps: Number(audioBitrateKbps.value || 192),
          orderType: orderType.value,
          timeRange: Number(timeRange.value || -1),
          videoZoneType: videoZoneType.value,
          timeStart: timeStart.value,
          timeEnd: timeEnd.value,
          pageSize: Number(pageSize.value || 20),
          maxCandidates: Number(maxCandidates.value || 8),
        };

        try {
          const resp = await fetch("/api/jobs", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) {
            throw new Error(data.error || "创建任务失败");
          }
          currentJobId = data.jobId;
          setHint(`任务已创建：${currentJobId}`);
          await refreshJob();
          pollTimer = setInterval(refreshJob, 1500);
        } catch (err) {
          setHint(`错误：${err.message}`, true);
          summary.textContent = "暂无任务";
        }
      });

      pickDirBtn.addEventListener("click", async () => {
        if (!window.desktopApi || typeof window.desktopApi.pickDownloadDirectory !== "function") {
          setHint("当前运行环境不支持系统目录选择，请手动输入路径。", true);
          return;
        }
        try {
          const selected = await window.desktopApi.pickDownloadDirectory();
          if (selected) {
            outputDir.value = selected;
            setHint(`已选择下载目录：${selected}`);
          }
        } catch (err) {
          setHint(`选择目录失败：${err.message}`, true);
        }
      });

      biliLoginBtn.addEventListener("click", async () => {
        if (!window.desktopApi || typeof window.desktopApi.bilibiliLoginAndGetCookie !== "function") {
          setCookieInfo("当前运行环境不支持内置登录，请手动粘贴 Cookie。", true);
          return;
        }
        if (cookieActionBusy) return;
        setCookieActionBusy(true);
        setCookieInfo("请在弹出的 B 站登录窗口完成扫码或账号密码登录...");
        try {
          const result = await window.desktopApi.bilibiliLoginAndGetCookie();
          const cookieText = result && result.cookie ? String(result.cookie) : "";
          if (!cookieText) {
            throw new Error("未获取到 Cookie，请重试。");
          }
          cookie.value = cookieText;
          persistCookie(cookieText);
          await inspectCookie(true);
          setCookieInfo(
            `登录成功，已自动获取 Cookie（${(result.cookieKeys || []).length || 0} 个键）。`
          );
        } catch (err) {
          setCookieInfo(`自动登录失败：${err.message}`, true);
        } finally {
          setCookieActionBusy(false);
        }
      });

      cookieCheckBtn.addEventListener("click", async () => {
        if (cookieActionBusy) return;
        setCookieActionBusy(true);
        try {
          await inspectCookie(true);
        } catch (err) {
          setCookieInfo(`Cookie 检查失败：${err.message}`, true);
        } finally {
          setCookieActionBusy(false);
        }
      });

      clearCookieBtn.addEventListener("click", async () => {
        if (cookieActionBusy) return;
        setCookieActionBusy(true);
        try {
          cookie.value = "";
          persistCookie("");
          let msg = "已清空手动 Cookie。";
          if (window.desktopApi && typeof window.desktopApi.clearBilibiliCookies === "function") {
            try {
              const result = await window.desktopApi.clearBilibiliCookies();
              msg += ` 已清理内置会话 Cookie ${Number(result?.removed || 0)} 个。`;
            } catch (err) {
              msg += ` 内置会话清理失败：${err.message}`;
            }
          }
          setCookieInfo(msg);
        } finally {
          setCookieActionBusy(false);
        }
      });

      async function refreshJob() {
        if (!currentJobId) return;
        try {
          const resp = await fetch(`/api/jobs/${currentJobId}`);
          const data = await resp.json();
          if (!resp.ok) {
            throw new Error(data.error || "读取任务失败");
          }
          renderJob(data);
          if (!["running"].includes(data.status)) {
            clearPolling();
          }
        } catch (err) {
          setHint(`状态刷新失败：${err.message}`, true);
          clearPolling();
        }
      }

      function renderJob(job) {
        summary.textContent =
          `状态: ${job.status} | ` +
          `总数: ${job.total} | ` +
          `完成: ${job.completed} | ` +
          `成功: ${job.success} | ` +
          `失败: ${job.failed}`;

        items.innerHTML = job.items
          .map(
            (it) => `
            <article class="item ${it.status}">
              <div class="title">${escapeHtml(it.song)}</div>
              <div class="meta">
                <span>状态：${escapeHtml(it.status)}</span>
                <span>${escapeHtml(it.message || "")}</span>
                ${it.search ? `<span>BVID：${escapeHtml(it.search.bvid || "")}</span>` : ""}
                ${it.search ? `<span>评分：${escapeHtml(String(it.search.score ?? ""))}</span>` : ""}
              </div>
            </article>
          `
          )
          .join("");

        logs.textContent = job.logs.map((x) => `[${x.time}] ${x.message}`).join("\n") || "-";
      }

      function clearPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      function syncBitrateState() {
        const disabled = BITRATE_DISABLED_FORMATS.has(audioFormat.value);
        audioBitrateKbps.disabled = disabled;
        if (disabled) {
          audioBitrateKbps.title = "当前格式为无损或原始格式，不需要比特率。";
        } else {
          audioBitrateKbps.title = "";
        }
      }

      function setHint(text, isError = false) {
        hint.textContent = text;
        hint.className = isError ? "hint error" : "hint";
      }

      function setCookieInfo(text, isError = false) {
        cookieInfo.textContent = text;
        cookieInfo.className = isError ? "hint error" : "hint";
      }

      function setCookieActionBusy(busy) {
        cookieActionBusy = busy;
        biliLoginBtn.disabled = busy;
        cookieCheckBtn.disabled = busy;
        clearCookieBtn.disabled = busy;
      }

      function persistCookie(value) {
        try {
          const text = String(value || "").trim();
          if (!text) {
            localStorage.removeItem(COOKIE_STORAGE_KEY);
            return;
          }
          localStorage.setItem(COOKIE_STORAGE_KEY, text);
        } catch {
          // ignore storage errors
        }
      }

      function loadCookieFromStorage() {
        try {
          if (cookie.value) return;
          const saved = localStorage.getItem(COOKIE_STORAGE_KEY) || "";
          if (saved) {
            cookie.value = saved;
          }
        } catch {
          // ignore storage errors
        }
      }

      async function tryHydrateCookieFromElectron() {
        if (!window.desktopApi || typeof window.desktopApi.getBilibiliCookieSnapshot !== "function") {
          return;
        }
        try {
          if (cookie.value.trim()) return;
          const snapshot = await window.desktopApi.getBilibiliCookieSnapshot();
          if (snapshot && snapshot.hasRequired && snapshot.cookie) {
            cookie.value = String(snapshot.cookie);
            persistCookie(cookie.value);
            setCookieInfo("检测到已登录的内置会话，已自动回填 Cookie。");
          }
        } catch {
          // ignore
        }
      }

      async function inspectCookie(apply = true) {
        const cookieText = String(cookie.value || "").trim();
        if (!cookieText) {
          setCookieInfo("当前未填写 Cookie。可手动输入，或点“内置登录”自动获取。");
          return;
        }
        const resp = await fetch("/api/cookie/inspect", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ cookie: cookieText, apply }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || "Cookie 检查失败");
        }
        if (data.hasRequired) {
          setCookieInfo("Cookie 已包含 SESSDATA / bili_jct / DedeUserID，可用于下载受限内容。");
        } else {
          setCookieInfo(`Cookie 不完整，缺少：${(data.missingKeys || []).join(", ")}`, true);
        }
      }

      function escapeHtml(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }
    </script>
  </body>
</html>
